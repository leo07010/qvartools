name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: >
        What problem does this solve? What workflow does it enable?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: >
        If you have a specific API or approach in mind, describe it here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
