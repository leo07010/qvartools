name: Bug Report
description: Report a bug in qvartools
labels: [bug]

body:
  - type: markdown
    attributes:
      value: >
        Thanks for taking the time to report a bug. Please fill out the
        sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: >
        Minimal code or steps that reproduce the bug. Use a code block.
      placeholder: |
        ```python
        from qvartools import ...
        ```

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include the full traceback if applicable.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS:
        - Python version:
        - qvartools version:
        - PyTorch version:
        - GPU (if relevant):
      render: markdown
