# =============================================================================
# Flow + CI Krylov Pipeline  (flow_ci_krylov.py)
#
# Trains a normalizing-flow model to generate determinant configurations,
# then builds a Krylov subspace (SKQD) from those configurations to
# approximate the ground-state energy.
# =============================================================================

# ---- Molecule ---------------------------------------------------------------
molecule: h2                  # Molecule identifier (h2, lih, h2o, …)

# ---- Pipeline mode ----------------------------------------------------------
skip_nf_training: false       # If true, skip NF training and use Direct-CI
subspace_mode: skqd           # Subspace method: skqd or sqd

# ---- Training loss weights --------------------------------------------------
teacher_weight: 0.5           # Weight for teacher (KL-divergence) loss term
physics_weight: 0.4           # Weight for physics-informed energy loss term
entropy_weight: 0.1           # Weight for entropy regularisation term

# ---- Training parameters ----------------------------------------------------
# Note: effective values may be scaled by system size inside the script.
max_epochs: 400               # Maximum training epochs
min_epochs: 100               # Minimum training epochs before early stopping
samples_per_batch: 2000       # Number of samples drawn per training batch
nf_hidden_dims: [256, 256]    # Hidden layer sizes for normalizing-flow network
nqs_hidden_dims: [256, 256, 256, 256]  # Hidden layer sizes for NQS network

# ---- SKQD parameters -------------------------------------------------------
max_krylov_dim: 15            # Maximum Krylov subspace dimension
shots_per_krylov: 100000      # Shots (samples) used per Krylov vector

# ---- Basis management -------------------------------------------------------
max_accumulated_basis: 4096   # Cap on total accumulated basis configurations
use_diversity_selection: true # Enable diversity-based configuration selection
max_diverse_configs: 2048     # Maximum configurations kept after diversity filter

# ---- Residual expansion -----------------------------------------------------
use_residual_expansion: true  # Enable iterative residual basis expansion
residual_iterations: 8        # Number of residual expansion iterations
residual_configs_per_iter: 150  # Configurations added per residual iteration

# ---- Hardware ---------------------------------------------------------------
device: auto                  # Torch device: auto (detect cuda/cpu), cpu, cuda

# ---- Output -----------------------------------------------------------------
verbose: true                 # Print detailed progress information
